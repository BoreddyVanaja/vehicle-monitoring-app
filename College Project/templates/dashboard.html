<!DOCTYPE html>
<html>

<head>
  <title>Vehicle Load Monitoring System</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background-color: #f5f5f5;
    }

    h1 {
      color: #333;
    }

    .btn-container {
      margin: 15px;
    }

    button {
      padding: 10px 15px;
      margin: 5px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      border-radius: 5px;
    }

    .download-btn {
      background-color: #4CAF50;
      color: white;
    }

    .delete-btn {
      background-color: #f44336;
      color: white;
    }

    table {
      margin: auto;
      border-collapse: collapse;
      width: 80%;
      background: white;
    }

    th,
    td {
      border: 1px solid black;
      padding: 10px;
    }

    th {
      background-color: #e0e0e0;
    }

    .overload {
      color: red;
      font-weight: bold;
      background-color: #ffebee;
    }

    .normal {
      color: green;
    }

    #count {
      margin: 20px;
      font-size: 20px;
      font-weight: bold;
      color: #d32f2f;
    }

    #status {
      font-size: 22px;
      margin: 10px;
      font-weight: bold;
    }

    .chart-container {
      width: 70%;
      margin: auto;
      margin-top: 40px;
    }
  </style>

</head>

<body>

  <h1>🚚 Vehicle Load Monitoring Dashboard</h1>

  <!-- BUTTONS -->
  <div class="btn-container">
    <button class="download-btn" onclick="downloadCSV()">Download Excel</button>
    <button class="delete-btn" onclick="deleteLogs()">Delete All Logs</button>
  </div>

  <h2 id="status">Checking system...</h2>

  <h3 id="count">Total Overloaded Vehicles: 0</h3>

  <table>
    <tr>
      <th>Vehicle</th>
      <th>Weight (g)</th>
      <th>Status</th>
      <th>Time</th>
    </tr>
    <tbody id="table"></tbody>
  </table>

  <div class="chart-container">
    <canvas id="loadChart"></canvas>
  </div>

  <!-- 🔔 SOUND ALERT -->
  <audio id="alarm" src="https://www.soundjay.com/button/beep-07.wav"></audio>

  <script>

    const apiURL = "http://127.0.0.1:5000/get_loads";
    const deleteURL = "http://127.0.0.1:5000/delete_logs";

    let chart;

    async function loadData() {

      try {

        const response = await fetch(apiURL);
        const data = await response.json();

        let table = document.getElementById("table");
        table.innerHTML = "";

        let labels = [];
        let weights = [];
        let overloadCount = 0;
        let overloadExists = false;

        data.forEach(item => {

          if (item.status === "OVERLOAD") {

            overloadCount++;
            overloadExists = true;

            table.innerHTML += `
            <tr class="overload">
              <td>${item.vehicle_number}</td>
              <td>${item.weight * 1}</td>
              <td>${item.status}</td>
              <td>${item.timestamp}</td>
            </tr>
            `;

            labels.push(item.vehicle_number);
            weights.push(item.weight * 1);
          }

        });

        if (!overloadExists) {
          table.innerHTML = `
            <tr>
              <td colspan="4" class="normal">No overloaded vehicles 🎉</td>
            </tr>
          `;
        }

        document.getElementById("status").innerText =
          overloadExists ? "🚨 OVERLOAD PRESENT" : "✅ ALL VEHICLES NORMAL";

        document.getElementById("count").innerText =
          "Total Overloaded Vehicles: " + overloadCount;

        updateChart(labels, weights);

      } catch (error) {
        console.log("Error fetching data:", error);
      }

    }

    function updateChart(labels, weights) {

      if (chart) {
        chart.destroy();
      }

      const ctx = document.getElementById('loadChart');

      chart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [{
            label: 'Vehicle Load (grams)',
            data: weights
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: {
              display: true
            }
          }
        }
      });

    }

    function downloadCSV() {

      let csv = "Vehicle,Weight(g),Status,Time\n";

      document.querySelectorAll("#table tr").forEach(row => {
        let cols = row.querySelectorAll("td");
        if (cols.length) {
          csv += `${cols[0].innerText},${cols[1].innerText},${cols[2].innerText},${cols[3].innerText}\n`;
        }
      });

      let blob = new Blob([csv], { type: "text/csv" });
      let url = URL.createObjectURL(blob);

      let a = document.createElement("a");
      a.href = url;
      a.download = "vehicle_data.csv";
      a.click();
    }

    // DELETE LOGS FUNCTION
    async function deleteLogs() {

      let confirmDelete = confirm("Are you sure you want to delete all logs?");

      if (!confirmDelete) return;

      try {
        const response = await fetch(deleteURL, {
          method: "DELETE"
        });

        const result = await response.json();

        alert(result.message || "Logs deleted successfully");

        loadData(); // refresh dashboard

      } catch (error) {
        console.log("Error deleting logs:", error);
      }
    }

    // AUTO REFRESH EVERY MINUTE
    setInterval(loadData, 60000);

    loadData();

  </script>

</body>

</html>
